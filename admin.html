<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAIL.STORE — Manager Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #070b14; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; }
        .main-content { margin-left: 260px; padding: 40px; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 20px; } }
    </style>
</head>
<body>

    <aside class="sidebar glass p-6 hidden md:block">
        <h2 class="text-xl font-bold mb-10 tracking-tighter text-blue-400">ADMIN.PANEL</h2>
        <nav class="space-y-4">
            <a href="#" class="block p-3 glass rounded-xl text-sm font-bold">Dashboard</a>
            <a href="#" class="block p-3 hover:bg-white/5 rounded-xl text-sm opacity-60">Manage Stock</a>
            <a href="#" class="block p-3 hover:bg-white/5 rounded-xl text-sm opacity-60">Order History</a>
            <a href="#" class="block p-3 hover:bg-white/5 rounded-xl text-sm opacity-60">Settings</a>
        </nav>
        <button onclick="logout()" class="absolute bottom-10 left-6 text-red-400 text-xs font-bold uppercase tracking-widest">Sign Out</button>
    </aside>

    <main class="main-content">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-[32px]">
                <p class="text-[10px] uppercase opacity-40 font-bold mb-2">Available Stock</p>
                <h3 id="stat-stock" class="text-4xl font-black">0</h3>
            </div>
            <div class="glass p-6 rounded-[32px]">
                <p class="text-[10px] uppercase opacity-40 font-bold mb-2">Total Sales</p>
                <h3 id="stat-sales" class="text-4xl font-black text-emerald-400">$0.00</h3>
            </div>
            <div class="glass p-6 rounded-[32px]">
                <p class="text-[10px] uppercase opacity-40 font-bold mb-2">Total Users</p>
                <h3 id="stat-users" class="text-4xl font-black text-blue-400">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-1 glass p-8 rounded-[40px]">
                <h4 class="text-lg font-bold mb-6">Add New Account</h4>
                <div class="space-y-4">
                    <select id="acc-type" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:outline-none focus:border-blue-500">
                        <option value="Fresh">Gmail Fresh</option>
                        <option value="Aged">Gmail Aged</option>
                    </select>
                    <textarea id="acc-data" rows="4" placeholder="email|pass|recovery (One per line)" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:outline-none"></textarea>
                    <button onclick="addBulkStock()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-500 transition">Add To Inventory</button>
                </div>
            </div>

            <div class="lg:col-span-2 glass p-8 rounded-[40px]">
                <h4 class="text-lg font-bold mb-6">Recent Inventory</h4>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="opacity-30 border-b border-white/5">
                            <tr>
                                <th class="pb-4">Category</th>
                                <th class="pb-4">Credentials</th>
                                <th class="pb-4">Status</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-list" class="divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Supabase Init (Ganti dengan API Key Anda)
        const supabaseClient = supabase.createClient('URL_PROYEK', 'ANON_KEY');

        async function addBulkStock() {
            const type = document.getElementById('acc-type').value;
            const lines = document.getElementById('acc-data').value.split('\n');
            const dataToPush = lines.filter(line => line.trim() !== '').map(line => ({
                category: type,
                content: line,
                is_sold: false
            }));

            const { error } = await supabaseClient.from('gmail_stocks').insert(dataToPush);
            if (!error) {
                alert('Success added ' + dataToPush.length + ' accounts!');
                location.reload();
            }
        }

        async function loadData() {
            const { data: stocks } = await supabaseClient.from('gmail_stocks').select('*').limit(10).order('id', {ascending: false});
            const list = document.getElementById('inventory-list');
            stocks.forEach(s => {
                list.innerHTML += `
                    <tr>
                        <td class="py-4 font-bold text-blue-400">${s.category}</td>
                        <td class="py-4 font-mono text-[10px] opacity-60">${s.content.substring(0,20)}...</td>
                        <td class="py-4">${s.is_sold ? '❌ Sold' : '✅ Ready'}</td>
                    </tr>
                `;
            });
            document.getElementById('stat-stock').innerText = stocks.length;
        }

        loadData();
    </script>
</body>
</html>
