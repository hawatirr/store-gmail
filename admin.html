<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - GMAIL.STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-200">
    <nav class="bg-slate-800 border-b border-slate-700 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl uppercase tracking-tighter">Admin <span class="text-blue-500">Panel</span></h1>
            <button onclick="logout()" class="text-xs bg-red-500/10 text-red-500 px-4 py-2 rounded-lg border border-red-500/20">Logout</button>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <p class="text-xs text-slate-400 uppercase font-bold">Total Stock</p>
                <p id="stat-total" class="text-2xl font-black">0</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <p class="text-xs text-slate-400 uppercase font-bold">Success Orders</p>
                <p id="stat-success" class="text-2xl font-black">0</p>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-[32px] border border-slate-700 mb-8">
            <h2 class="text-xl font-bold mb-4">Add New Accounts</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <select id="acc-type" class="bg-slate-900 border border-slate-700 rounded-xl p-3">
                    <option value="Fresh">Gmail Fresh</option>
                    <option value="Aged">Gmail Aged</option>
                </select>
                <input id="acc-data" type="text" placeholder="Format: email|pass|recovery" class="bg-slate-900 border border-slate-700 rounded-xl p-3 col-span-1 md:col-span-2">
            </div>
            <button onclick="addStock()" class="mt-4 bg-blue-600 w-full py-3 rounded-xl font-bold hover:bg-blue-500 transition">Push to Database</button>
        </div>

        <div class="bg-slate-800 rounded-[32px] border border-slate-700 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-700/50 text-xs uppercase opacity-60">
                    <tr>
                        <th class="p-4">Type</th>
                        <th class="p-4">Credentials</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Action</th>
                    </tr>
                </thead>
                <tbody id="inventory-table">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://URL_PROJECT.supabase.co';
        const SUPABASE_KEY = 'ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // -- LOGIC UNTUK CEK LOGIN --
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) window.location.href = "login.html"; // Redirect ke login kalau belum masuk
            loadInventory();
        }

        async function addStock() {
            const type = document.getElementById('acc-type').value;
            const content = document.getElementById('acc-data').value;
            
            const { error } = await supabase.from('gmail_stocks').insert([{ category: type, content: content }]);
            if (!error) {
                alert("Stock Added!");
                loadInventory();
            }
        }

        async function loadInventory() {
            const { data } = await supabase.from('gmail_stocks').select('*').order('id', { ascending: false });
            const table = document.getElementById('inventory-table');
            table.innerHTML = '';
            
            data.forEach(item => {
                table.innerHTML += `
                    <tr class="border-t border-slate-700 text-sm">
                        <td class="p-4">${item.category}</td>
                        <td class="p-4 font-mono text-xs opacity-60">${item.content}</td>
                        <td class="p-4">${item.is_sold ? '❌ Sold' : '✅ Available'}</td>
                        <td class="p-4"><button onclick="deleteItem(${item.id})" class="text-red-500">Delete</button></td>
                    </tr>
                `;
            });
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        }

        checkUser();
    </script>
</body>
</html>
