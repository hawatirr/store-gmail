<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAIL.STORE — Premium Accounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #0a0e1a 0%, #111827 100%);
            min-height: 100vh;
            color: #f9fafb;
        }
        .gradient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
        }
        .orb-1 { top: -10%; left: -5%; width: 400px; height: 400px; background: #3b82f6; animation: float 8s ease-in-out infinite; }
        .orb-2 { bottom: -10%; right: -5%; width: 350px; height: 350px; background: #10b981; animation: float 8s ease-in-out infinite 2s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        .card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-4px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    </style>
</head>
<body class="relative">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    
    <!-- Navigation -->
    <nav class="container py-6 relative z-10">
        <div class="flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tight">
                GMAIL<span class="text-blue-500">.STORE</span>
            </div>
            <div class="flex gap-4">
                <a href="login.html" class="text-sm text-gray-400 hover:text-white transition">Masuk</a>
                <a href="register.html" class="text-sm bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition">Daftar</a>
            </div>
        </div>
    </nav>
    
    <!-- Hero Section -->
    <header class="container pt-16 pb-12 text-center relative z-10">
        <div class="inline-block px-4 py-1.5 rounded-full text-xs font-medium bg-blue-500/10 text-blue-400 border border-blue-500/20 mb-6">
            ✨ Premium Account Supplier
        </div>
        <h1 class="text-5xl md:text-6xl font-bold mb-6 leading-tight">
            Quality Accounts.<br>
            <span class="bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">Instant Access.</span>
        </h1>
        <p class="text-gray-400 text-lg max-w-2xl mx-auto leading-relaxed">
            Trusted Gmail accounts for marketing, verification, and business needs. Automated delivery, 24/7 support.
        </p>
        <!-- Admin Link (Hidden subtle) -->
        <div class="mt-8">
            <a href="admin.html" class="text-xs text-gray-700 hover:text-gray-500 transition opacity-30 hover:opacity-100">Admin Portal</a>
        </div>
    </header>
    
    <!-- Products -->
    <main class="container pb-24 relative z-10">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
            <div class="col-span-full text-center text-gray-500">Memuat produk...</div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="container py-8 border-t border-white/5 relative z-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-gray-500">
            <div>&copy; 2026 GMAIL.STORE</div>
            <div class="flex gap-6">
                <span>Secure Payment</span>
                <span>Instant Delivery</span>
                <span>24/7 Support</span>
            </div>
        </div>
    </footer>

    <script>
        // Konfigurasi Supabase - GANTI URL_PROYEK dengan ID proyek Supabase Anda
        // Contoh: https://abcdefghij.supabase.co
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IllPVVJfUFJPSkVDVF9JRCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjQwMDAwMDAwLCJleHAiOjE5NTU1Nzc2MDB9.YOUR_ANON_KEY_HERE'; // Ganti dengan Anon Key dari Supabase
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Mock data fallback jika Supabase tidak dikonfigurasi
        const mockProducts = [
            { id: 1, name: 'Gmail Fresh', description: 'Akun Gmail baru dibuat, siap pakai untuk verifikasi.', price: 50000, stock: 50, category: 'Fresh' },
            { id: 2, name: 'Gmail Aged', description: 'Akun Gmail lama (6+ bulan), lebih terpercaya.', price: 120000, stock: 25, category: 'Aged' },
            { id: 3, name: 'Outlook Premium', description: 'Akun Outlook premium dengan fitur lengkap.', price: 75000, stock: 30, category: 'Outlook' }
        ];

        async function loadProducts() {
            const container = document.getElementById('product-list');
            
            // Cek jika URL belum dikonfigurasi
            if (SUPABASE_URL.includes('YOUR_PROJECT_ID')) {
                console.log('Supabase belum dikonfigurasi, menggunakan mock data');
                renderProducts(mockProducts);
                return;
            }
            
            try {
                const { data, error } = await supabase.from('products').select('*');
                
                if (error) {
                    console.warn('Error loading from Supabase:', error.message);
                    console.log('Using mock data as fallback');
                    renderProducts(mockProducts);
                    return;
                }
                
                if (data && data.length > 0) {
                    renderProducts(data);
                } else {
                    renderProducts(mockProducts);
                }
            } catch (err) {
                console.error('Error loading products:', err);
                renderProducts(mockProducts);
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('product-list');
            container.innerHTML = '';
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'card p-8 flex flex-col';
                card.innerHTML = `
                    <div class="h-48 rounded-20 overflow-hidden mb-6 bg-gradient-to-br from-emerald-500/20 to-blue-500/20 flex items-center justify-center">
                        <svg class="w-20 h-20 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                    </div>
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-2xl font-semibold">${product.name}</h3>
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${product.stock > 0 ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">${product.stock > 0 ? 'Stok: ' + product.stock : 'Habis'}</span>
                    </div>
                    <p class="text-gray-400 text-sm mb-6 flex-grow leading-relaxed">${product.description || 'Premium account with instant access.'}</p>
                    <div class="flex justify-between items-center pt-6 border-t border-white/5">
                        <div>
                            <span class="text-xs text-gray-500 uppercase tracking-wide">Harga</span>
                            <div class="text-3xl font-bold">Rp ${parseInt(product.price).toLocaleString('id-ID')}</div>
                        </div>
                        <button onclick="buyProduct('${product.name}')" class="btn-primary px-8 py-3 rounded-xl font-semibold text-white">Beli</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function buyProduct(productName) {
            const message = `Halo, saya tertarik membeli ${productName}. Apakah masih tersedia?`;
            window.open(`https://wa.me/6281234567890?text=${encodeURIComponent(message)}`, '_blank');
        }

        loadProducts();
    </script>
</body>
</html>
