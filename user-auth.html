<div class="glass p-10 rounded-[40px] max-w-md mx-auto mt-20">
    <h2 class="text-3xl font-black mb-8 text-center uppercase tracking-tighter">Join <span class="text-blue-500">Member</span></h2>
    <input id="u-email" type="email" placeholder="Email Address" class="w-full glass p-4 rounded-2xl mb-4">
    <input id="u-pass" type="password" placeholder="Password" class="w-full glass p-4 rounded-2xl mb-6">
    <div class="grid grid-cols-2 gap-4">
        <button onclick="userRegister()" class="glass border-blue-500/30 text-blue-400 font-bold py-4 rounded-2xl">Sign Up</button>
        <button onclick="userLogin()" class="bg-blue-600 font-bold py-4 rounded-2xl shadow-lg">Sign In</button>
    </div>
</div>

<script>
    async function userRegister() {
        const { data, error } = await supabase.auth.signUp({
            email: document.getElementById('u-email').value,
            password: document.getElementById('u-pass').value,
        });
        if (error) alert(error.message);
        else alert('Check your email for confirmation!');
    }
    // Tambahkan juga fungsi userLogin serupa
</script>
